<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コメントログイン</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>コメントログイン</header>

<div class="container">
    <h2>新規登録</h2>
    <input type="email" id="regMail" placeholder="メールアドレス">
    <input type="text" id="regNick" placeholder="ニックネーム">
    <input type="password" id="regPass" placeholder="パスワード">
    <button onclick="register()">登録する</button>

    <hr>

    <h2>ログイン</h2>
    <input type="email" id="logMail" placeholder="メールアドレス">
    <input type="password" id="logPass" placeholder="パスワード">
    <button onclick="login()">ログインする</button>
</div>

<script src="script.js"></script>
</body>
</html>
