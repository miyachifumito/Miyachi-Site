<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コメント掲示板</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>コメント掲示板</header>

<div class="container">
    <h3 id="welcome"></h3>

    <textarea id="message" placeholder="コメントを入力"></textarea>
    <button onclick="sendComment()">送信</button>
    <button onclick="logout()">ログアウト</button>

    <h2>投稿一覧</h2>
    <div id="commentsArea"></div>
</div>

<script src="script.js"></script>
</body>
</html>
